<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 130" font-family="'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',ui-rounded,system-ui,sans-serif">
  <defs>
    <linearGradient id="logoFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff6c2"/>
      <stop offset="55%" stop-color="#ffd24a"/>
      <stop offset="100%" stop-color="#ff9d3a"/>
    </linearGradient>
    <radialGradient id="puyoBody" cx="0.32" cy="0.28" r="0.85">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="22%" stop-color="#a9eb89"/>
      <stop offset="55%" stop-color="#74d756"/>
      <stop offset="100%" stop-color="#2e8a36"/>
    </radialGradient>
  </defs>

  <!-- Drop shadow for the type -->
  <text x="78" y="76" font-size="62" font-weight="900" fill="rgba(20,8,32,0.30)">Peg Drop</text>

  <!-- Stroked + filled wordmark -->
  <text x="78" y="70" font-size="62" font-weight="900"
        fill="url(#logoFill)" stroke="#1a0a2c" stroke-width="7" stroke-linejoin="round" paint-order="stroke fill">Peg Drop</text>

  <!-- Subtitle -->
  <text x="80" y="108" font-size="14" font-weight="800" letter-spacing="0.06em" fill="#1a0a2c" opacity="0.85">えすけーぷがめ vs</text>

  <!-- Green puyo icon (left) -->
  <g transform="translate(34,54)">
    <ellipse cx="0" cy="32" rx="26" ry="7" fill="rgba(20,8,32,0.30)"/>
    <circle cx="0" cy="0" r="28" fill="url(#puyoBody)" stroke="#1a0a2c" stroke-width="2.4"/>
    <ellipse cx="-9" cy="-12" rx="8" ry="5" fill="rgba(255,255,255,0.75)"/>
    <!-- eyes -->
    <ellipse cx="-9" cy="3" rx="6" ry="6.5" fill="#fff"/>
    <ellipse cx="9"  cy="3" rx="6" ry="6.5" fill="#fff"/>
    <ellipse cx="-7" cy="5" rx="3.6" ry="4" fill="#1a0a2c"/>
    <ellipse cx="11" cy="5" rx="3.6" ry="4" fill="#1a0a2c"/>
    <circle cx="-5.5" cy="3.5" r="1" fill="#fff"/>
    <circle cx="12.5" cy="3.5" r="1" fill="#fff"/>
  </g>
</svg>
