<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
<defs>
<filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
  <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.28"/>
</filter>
<filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
  <feGaussianBlur stdDeviation="4" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffe066"/><stop offset="100%" stop-color="#ff9d3a"/></linearGradient>
</defs>

<g filter="url(#shadow)"><circle cx="50" cy="50" r="44" fill="url(#g)" stroke="#111" stroke-width="4"/><circle cx="50" cy="50" r="35" fill="none" stroke="#fff" stroke-width="4" opacity=".85"/><path d="M25 38 C36 20 66 20 77 39" fill="none" stroke="#fff" stroke-width="7" opacity=".42" stroke-linecap="round"/><text x="50" y="68" text-anchor="middle" font-family="Arial Rounded MT Bold, sans-serif" font-size="58" font-weight="900" fill="#111">?</text></g>
</svg>