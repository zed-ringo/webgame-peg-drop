<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" font-family="'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',ui-rounded,system-ui,sans-serif">
  <defs>
    <radialGradient id="powerBody" cx="0.34" cy="0.26" r="0.88">
      <stop offset="0%" stop-color="#fff7c4"/>
      <stop offset="32%" stop-color="#ffd24a"/>
      <stop offset="78%" stop-color="#ff9d3a"/>
      <stop offset="100%" stop-color="#a8501a"/>
    </radialGradient>
    <linearGradient id="powerRing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5b3"/>
      <stop offset="100%" stop-color="#c97323"/>
    </linearGradient>
    <linearGradient id="powerGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Soft contact shadow -->
  <ellipse cx="50" cy="93" rx="36" ry="6" fill="rgba(20,8,32,0.32)"/>
  <!-- Outer thick black ring -->
  <circle cx="50" cy="50" r="48" fill="#1a0a2c"/>
  <!-- Bright bevel ring (gives plastic thickness) -->
  <circle cx="50" cy="50" r="46" fill="url(#powerRing)"/>
  <!-- Inner black border -->
  <circle cx="50" cy="50" r="40" fill="#1a0a2c"/>
  <!-- Body bottom-shadow base -->
  <circle cx="50" cy="52" r="38" fill="#a04a16"/>
  <!-- Body -->
  <circle cx="50" cy="50" r="38" fill="url(#powerBody)"/>
  <!-- Top gloss arc -->
  <path d="M16 38 Q50 14 84 38 Q72 28 50 28 Q28 28 16 38 Z" fill="url(#powerGloss)"/>
  <!-- Mini sheen -->
  <ellipse cx="36" cy="30" rx="9" ry="4" fill="#ffffff" opacity="0.85"/>
  <!-- Power glyph: thick black stroke + white inner stroke -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 30 56 A 20 20 0 1 0 70 56" stroke="#1a0a2c" stroke-width="9.5"/>
    <line x1="50" y1="22" x2="50" y2="52" stroke="#1a0a2c" stroke-width="9.5"/>
    <path d="M 30 56 A 20 20 0 1 0 70 56" stroke="#ffffff" stroke-width="4.6"/>
    <line x1="50" y1="22" x2="50" y2="52" stroke="#ffffff" stroke-width="4.6"/>
  </g>
  <!-- Tiny rivet highlights at NE/SW for plastic feel -->
  <circle cx="78" cy="22" r="1.7" fill="#ffffff" opacity="0.7"/>
  <circle cx="22" cy="78" r="1.4" fill="#ffffff" opacity="0.5"/>
</svg>
