<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Peg Drop — VS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800;900&display=swap">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app">
      <section class="hud">
        <div class="brand">
          <img class="logo" src="assets/logo.png" alt="Peg Drop" />
        </div>
        <div class="controls">
          <span class="stage-pill">
            <span class="stage-pill-label">STAGE</span>
            <strong id="stage-num">1/3</strong>
          </span>
          <button id="reset" class="icon-btn icon-btn-power" title="最初から" aria-label="最初から"></button>
        </div>
      </section>
      <section class="vs-bar">
        <div class="vs-side player">
          <div class="name-plate plate-player">
            <div class="hp-fill" id="player-hp-fill"></div>
            <span class="plate-stars" aria-hidden="true"><span class="star">★</span><span class="star">★</span></span>
            <span id="player-hp-text" class="plate-hp-num">50</span>
          </div>
        </div>
        <img class="vs-divider" src="assets/vs-burst.png" alt="VS" />
        <div class="vs-side enemy">
          <div class="name-plate plate-enemy">
            <div class="hp-fill" id="enemy-hp-fill"></div>
            <span id="enemy-hp-text" class="plate-hp-num">25</span>
            <span class="plate-stars" aria-hidden="true"><span class="star">★</span><span class="star">★</span></span>
          </div>
        </div>
      </section>
      <section class="stage">
        <div class="canvas-wrap">
          <div class="board-shell">
            <div class="board-bg board-bg-player" aria-hidden="true"></div>
            <div class="board-bg board-bg-enemy" aria-hidden="true"></div>
            <canvas id="canvas" width="480" height="540"></canvas>
          </div>
          <div class="char-mount vs-portrait player">
            <img id="mascot-img" src="assets/turtle-idle.png" alt="自分" />
          </div>
          <div class="char-mount vs-portrait enemy">
            <img id="enemy-img" alt="敵" />
          </div>
          <div id="stage-overlay" class="stage-overlay">
            <div class="overlay-card">
              <div class="overlay-title"></div>
              <div class="overlay-sub"></div>
            </div>
          </div>
        </div>
        <div class="hint-row">
          <img class="hint-mascot" src="assets/turtle-idle.png" alt="えすけーぷがめ" />
          <div class="speech-bubble" id="hint-bubble">
            <div class="speech-content" id="hint-content"></div>
            <div class="speech-dots" id="hint-dots"></div>
          </div>
        </div>
      </section>
    </main>
    <dialog id="stage-clear-dialog" class="celebrate-dialog">
      <form method="dialog">
        <img class="clear-art" src="assets/turtle-victory.png" alt="STAGE CLEAR!" />
        <menu>
          <button value="next" class="primary big">次のステージへ</button>
        </menu>
      </form>
    </dialog>
    <dialog id="final-victory-dialog" class="celebrate-dialog">
      <form method="dialog">
        <img class="clear-art" src="assets/turtle-victory.png" alt="VICTORY!" />
        <p class="celebrate-sub">黒幕を打ち倒したがめ！</p>
        <menu>
          <button value="restart" class="primary big">もう一度あそぶ</button>
        </menu>
      </form>
    </dialog>
    <dialog id="dialog">
      <form method="dialog">
        <span id="result-tag">RESULT</span>
        <h2 id="result-title">冒険終了</h2>
        <p id="result-text"></p>
        <menu>
          <button value="close">閉じる</button>
          <button value="restart" class="primary">もう一度</button>
        </menu>
      </form>
    </dialog>
    <script>window.GAME_CONFIG={slug:"peg-drop",title:"Peg Drop"};</script>
    <script src="app.js"></script>
    <script src="rules.js"></script>
  </body>
</html>
